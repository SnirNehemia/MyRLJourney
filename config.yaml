project:
  version: "1.2.6"
  env_name: "LunarLander-v3"
  seed: 0

save_parameters:
  run_name: "DDQN_ablation_Replay_and_TargetNetwork_WindOn"

network:
  input_size: 8
  output_size: 4
  hidden_size: [64, 64]

agent:
  buffer_size: 100000
  batch_size: 128
  gamma: 0.99
  tau: 0.005
  lr: 0.001
  update_every: 4
  DQN_type: "DDQN"
  use_replay_buffer: true
  use_target_network: true

training:
  n_episodes: 2500
  max_t: 1000
  eps_start: 1.0
  eps_end: 0.01
  eps_decay: 0.999
  win_condition: 200.0

  # Learning Rate Scheduler
  lr_start: 0.001      # Initial learning rate
  lr_end: 0.0001        # Minimum learning rate
  lr_decay: 0.999       # Multiplicative decay factor per episode
  
  # Tau Scheduler
  tau_start: 0.01       # Initial tau for soft update
  tau_end: 0.001        # Minimum tau
  tau_decay: 0.999      # Multiplicative decay factor per episode

experiment:
  seeds: [0, 1,3,4]
  n_episodes: 3000

ablation_study:
  seed: 42
  n_episodes: 3000

lunar_params:
  gravity: -10.0
  is_wind: true
  wind: 10.0
  turbulence: 2.0