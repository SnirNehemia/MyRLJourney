training:
  n_episodes: 2500
  max_t: 750
  eps_start: 1.0
  eps_end: 0.01
  eps_decay: 0.999
  win_condition: 200.0

experiment:
  seeds: [0, 1, 2]
  n_episodes: 2500

lunar_params:
  gravity: -10.0
  wind: 10.0
  turbulence: 1.0