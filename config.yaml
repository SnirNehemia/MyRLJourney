project:
  version: "1.2.3"
  env_name: "LunarLander-v3"
  seed: 0

save_parameters:
  run_name: "DDQN_scheduler_test"

network:
  input_size: 8
  output_size: 4
  hidden_size: [64, 64]

agent:
  buffer_size: 500000
  batch_size: 64
  gamma: 0.99
  tau: 0.005
  lr: 0.001
  update_every: 4
  DQN_type: "DDQN"

training:
  n_episodes: 2500
  max_t: 750
  eps_start: 1.0
  eps_end: 0.01
  eps_decay: 0.999
  win_condition: 200.0

  # Learning Rate Scheduler
  lr_start: 0.001      # Initial learning rate
  lr_end: 0.0001        # Minimum learning rate
  lr_decay: 0.995       # Multiplicative decay factor per episode
  
  # Tau Scheduler
  tau_start: 0.01       # Initial tau for soft update
  tau_end: 0.001        # Minimum tau
  tau_decay: 0.995      # Multiplicative decay factor per episode

experiment:
  seeds: [0, 1,3,4]
  n_episodes: 2500

lunar_params:
  gravity: -10.0
  wind: 10.0
  turbulence: 2.0